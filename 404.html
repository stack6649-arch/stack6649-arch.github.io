<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex">
  <title>Redirecting…</title>
  <style>html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;color:#333;display:flex;align-items:center;justify-content:center}</style>
</head>
<body>
  <div>
    Redirecting…
    <noscript>
      If you are not redirected, <a id="link" href="/keymusecommerce/">click here</a>.
    </noscript>
  </div>

  <script>
    (function () {
      var base = '/keymusecommerce';
      // If already under the project path, do nothing (avoid redirect loop)
      if (location.pathname === base || location.pathname.indexOf(base + '/') === 0) {
        return;
      }
      // Build target preserving path, query and hash
      var target = base + (location.pathname === '/' ? '/' : location.pathname) + (location.search || '') + (location.hash || '');
      // Use replace so history doesn't keep the intermediate 404 state
      location.replace(target);
    })();
  </script>
</body>
</html>
